services:
  discord-voice-watcher-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-voice-watcher-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${CALENDAR_OAUTH_PORT:-8080}:${CALENDAR_OAUTH_PORT:-8080}"
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?set DISCORD_BOT_TOKEN in .env}
      VOICE_CHANNEL_ID: ${VOICE_CHANNEL_ID:?set VOICE_CHANNEL_ID in .env}
      WEBHOOK_URL: ${WEBHOOK_URL:?set WEBHOOK_URL in .env}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      JULGAR_CHANNEL_ID: ${JULGAR_CHANNEL_ID:?set JULGAR_CHANNEL_ID in .env}
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CALENDAR_CHANNEL_ID: ${CALENDAR_CHANNEL_ID:-}
      CALENDAR_REDIRECT_URI: ${CALENDAR_REDIRECT_URI:-http://localhost:8080/oauth2callback}
      CALENDAR_OAUTH_PORT: ${CALENDAR_OAUTH_PORT:-8080}
      CALENDAR_TIMEZONE: ${CALENDAR_TIMEZONE:-America/Sao_Paulo}
